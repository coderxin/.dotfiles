---

- defaults:
    link:
      relink: true
      force: true
    shell:
      stdout: true
      stderr: true

- clean: ['~']

- shell:
  - command: sh install/pre-install.sh
    description: Running pre installation script

- link:
    ~/.shell:
      create: true
      path: shell
    ~/.zshrc: .config/.zshrc
    ~/.tmux.conf: .config/.tmux.conf
    ~/.config/nvim/: .config/nvim-setup/
    ~/.config/k9s/hotkey.yml: .config/k9s/hotkey.yml
    ~/Library/Application Support/lazygit/config.yml: .config/lazygit/config.yml
    ~/.config/btop/btop.conf: .config/btop/btop.conf
    ~/.config/git/ignore:
      create: true
      path: .config/git/ignore
    ~/.config/ghostty/config:
      create: true
      path: .config/ghostty/config
    ~/.config/zellij/:
      create: true
      path: .config/zellij/
    ~/.claude/skills:
      create: true
      path: private-skills
